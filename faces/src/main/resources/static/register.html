<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>人脸注册</title>
    <style type="text/css">
        *{ margin: 0; padding: 0; }
        body{ background: url(img/bg.jpg) no-repeat center; }
        h1{ color: #fff; text-align: center; line-height: 80px; }
        .camera{ width:400px; height:400px; margin:0 auto; }
        .reg{ width:360px; height:55px; margin: 0 auto; }
        #register{ width:150px; height:50px; background-color: #2196f3; text-align: center; line-height: 50px; color: #fff; border-radius: 10px; cursor: pointer; border: none; font-size: 16px; }
        #previewBtn{ width:150px; height:50px; background-color: #4CAF50; text-align: center; line-height: 50px; color: #fff; border-radius: 10px; cursor: pointer; border: none; font-size: 16px; margin-left: 20px; }
        #canvas{ display: none; }
        #name{ width:300px; height:50px; margin: 0 auto; }
        #video{ border: 2px solid #2196f3; border-radius: 10px; }
        .status{ color: #fff; text-align: center; margin-top: 10px; }
        .preview-area{ width:400px; margin: 20px auto; display: none; }
        .preview-area img{ border: 2px solid #4CAF50; border-radius: 10px; }
        .preview-area p{ color: #fff; text-align: center; margin-top: 10px; }
        #username{ padding: 8px; width: 200px; border-radius: 5px; border: 1px solid #ccc; }
    </style>
</head>
<body>
<h1>百度云人脸注册</h1>
<div id="name">
    用户名：<input type="text" name="username" id="username" placeholder="请输入用户名"/>
</div>

<div class="camera">
    <video id="video" width="350" height="200" src="" autoplay playsinline></video>
    <canvas id="canvas" width="350" height="200"></canvas>
</div>

<div class="status" id="status">请确保摄像头已开启并对准人脸</div>

<div class="preview-area" id="previewArea">
    <img id="previewImg" width="350" height="200" />
    <p>这是将上传的图片，请确认人脸清晰可见</p>
</div>

<div class="reg">
    <button id="previewBtn">预览图片</button>
    <button id="register">确定注册</button>
</div>

<script type="text/javascript" src="js/jquery-3.1.0.min.js"></script>
<script type="text/javascript">
    var video = document.getElementById('video');
    var canvas = document.getElementById('canvas');
    var userContext = canvas.getContext("2d");
    var status = document.getElementById('status');
    var previewArea = document.getElementById('previewArea');
    var previewImg = document.getElementById('previewImg');
    var isCameraReady = false;
    var lastCapturedImage = null;

    // 获取媒体流
    function getMediaStream() {
        var constraints = { 
            video: { 
                width: { ideal: 350 }, 
                height: { ideal: 200 },
                facingMode: 'user'
            }, 
            audio: false 
        };
        
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            navigator.mediaDevices.getUserMedia(constraints)
                .then(function(stream) {
                    video.srcObject = stream;
                    isCameraReady = true;
                    status.innerHTML = "<span style='color:green'>✓</span> 摄像头已就绪，请对准人脸";
                })
                .catch(function(err) {
                    console.log("获取摄像头失败: " + err);
                    status.innerHTML = "<span style='color:red'>✗</span> 无法访问摄像头，请检查权限设置";
                    alert("无法访问摄像头，请在浏览器设置中允许摄像头访问\n\n错误详情: " + err.message);
                });
        } else {
            var getUserMedia = navigator.getUserMedia || navigator.webkitGetUserMedia || navigator.mozGetUserMedia || navigator.msGetUserMedia;
            if (getUserMedia) {
                getUserMedia.call(navigator, constraints, function(stream) {
                    video.srcObject = stream;
                    isCameraReady = true;
                    status.innerHTML = "<span style='color:green'>✓</span> 摄像头已就绪，请对准人脸";
                }, function(err) {
                    status.innerHTML = "<span style='color:red'>✗</span> 无法访问摄像头";
                });
            } else {
                status.innerHTML = "<span style='color:red'>✗</span> 您的浏览器不支持摄像头功能";
            }
        }
    }

    // 捕获图片
    function captureImage() {
        try {
            userContext.drawImage(video, 0, 0, 350, 200);
            var imageData = canvas.toDataURL("image/jpeg", 0.9);
            lastCapturedImage = imageData.split(",")[1];
            return imageData;
        } catch (e) {
            console.error("捕获图片失败: ", e);
            return null;
        }
    }

    // 预览图片
    document.getElementById("previewBtn").onclick = function() {
        if (!isCameraReady) {
            alert("摄像头尚未就绪");
            return;
        }
        
        var imageData = captureImage();
        if (imageData) {
            previewImg.src = imageData;
            previewArea.style.display = "block";
            status.innerHTML = "<span style='color:green'>✓</span> 图片已捕获，请确认人脸清晰";
        } else {
            alert("无法捕获图片");
        }
    };

    // 注册
    document.getElementById("register").onclick = function() {
        var username = $("#username").val().trim();
        
        if (!username) {
            alert("请输入用户名");
            return;
        }
        
        if (!isCameraReady) {
            alert("摄像头尚未就绪，请稍候或检查权限");
            return;
        }

        // 先捕获并预览
        var imageData = captureImage();
        if (!imageData) {
            alert("无法捕获人脸图片");
            return;
        }
        
        var faceBase = imageData.split(",")[1];
        if (!faceBase) {
            alert("图片数据为空");
            return;
        }

        // 显示预览
        previewImg.src = imageData;
        previewArea.style.display = "block";
        
        status.innerHTML = "<span style='color:blue'>⏳</span> 正在上传人脸数据...";

        $.ajax({
            url: "register",
            type: "post",
            data: { "faceBase": faceBase, "userName": username },
            dataType: "text",
            success: function(result) {
                console.log("服务器返回结果:", JSON.stringify(result));
                result = $.trim(result);
                if (result === '1') {
                    status.innerHTML = "<span style='color:green'>✓</span> 注册成功！";
                    alert("注册成功！即将跳转到登录页面");
                    setTimeout(function() {
                        window.location.href = "login.html";
                    }, 500);
                } else if (result === '2') {
                    status.innerHTML = "<span style='color:orange'>⚠</span> 用户名已存在";
                    alert("该用户名已注册，请使用其他用户名");
                } else if (result === '0') {
                    status.innerHTML = "<span style='color:red'>✗</span> 人脸检测失败";
                    alert("人脸检测失败，请确保：\n1. 人脸在画面中央\n2. 光线充足\n3. 正面面对摄像头\n4. 没有遮挡");
                } else {
                    status.innerHTML = "<span style='color:red'>✗</span> 注册失败";
                    alert("注册失败，请重试\n服务器返回: " + result);
                }
            },
            error: function(xhr, ajaxStatus, error) {
                console.error("AJAX错误 - 状态:", ajaxStatus, ", 错误:", error);
                console.error("响应内容:", xhr.responseText);
                status.innerHTML = "<span style='color:red'>✗</span> 网络错误";
                alert("网络错误，请检查网络连接\n状态: " + ajaxStatus + "\n错误: " + error);
            }
        });
    };

    // 页面加载完成后初始化摄像头
    window.addEventListener('DOMContentLoaded', function() {
        getMediaStream();
    });
</script>
</body>
</html>
